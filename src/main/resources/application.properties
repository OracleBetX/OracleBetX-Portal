spring.application.name=portal-app
server.port=19080
management.server.port=${MANAGEMENT_PORT:19081}
management.endpoints.web.exposure.include=health,metrics,prometheus
management.metrics.tags.application=${spring.application.name}

# =============================================================================
# Nacos Config
# =============================================================================
spring.cloud.nacos.config.server-addr=${NACOS_SERVER_ADDR:104.223.27.218:8848}
spring.cloud.nacos.config.namespace=${NACOS_NAMESPACE:dev}
spring.cloud.nacos.config.username=${NACOS_USERNAME:nacos}
spring.cloud.nacos.config.password=${NACOS_PASSWORD:qw123456}

# 节点 ID
node.id=${PORTAL_NODE_ID:portal-01}

spring.config.import=\
  nacos:global.common-infra.properties?group=GLOBAL_COMMON&refresh=true,\
  nacos:global.common-mongodb.properties?group=GLOBAL_COMMON&refresh=true,\
  nacos:global.common-logging.properties?group=GLOBAL_COMMON&refresh=true,\
  nacos:node.${node.id}.properties?group=NODE_CONFIG&refresh=true

# MongoDB 库名（产品目录 product_root/market/instrument）
spring.data.mongodb.database=${MONGODB_DB:x-bet}

# =============================================================================
# 服务私有配置
# =============================================================================

# 通用节点发现
node.discovery.node-id=${node.id}
node.discovery.node-type=PORTAL
node.discovery.port=${server.port}
node.discovery.routing-key-type=NONE

# 能力索引（订阅所有节点类型，用于管理查询）
node.discovery.index.enabled=true

# 通用节点 RPC（从 Nacos 动态发现节点地址）
node.rpc.connect-timeout-ms=3000
node.rpc.read-timeout-ms=10000

# PostgreSQL（exchange_db，结算表）
spring.datasource.url=${EXCHANGE_DB_URL:jdbc:postgresql://${common.host:104.223.27.218}:5432/exchange_db}
spring.datasource.username=${EXCHANGE_DB_USER:ledger}
spring.datasource.password=${EXCHANGE_DB_PASSWORD:ledger_user_123}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
